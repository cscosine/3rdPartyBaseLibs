    # ---------------------------------------------------

    # ---------------------------------------------------
    # zip installation section
    - name: Zip Installations windows-msvc2022-x64-LLVM
      shell: pwsh
      run: |
        if ($env:GITHUB_REF_TYPE -eq "tag") {
          $VERSION = $env:GITHUB_REF_NAME
        } else {
          $VERSION = Get-Date -Format "yyyyMMdd-HHmmss"
        }

        "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "Using VERSION=$VERSION"

        # zip eigen3

        $src = "$env:GITHUB_WORKSPACE\install\msvc2022-x64-LLVM\eigen3"
        $dst = "$env:GITHUB_WORKSPACE\bundle-3rdPartyBaseLibs-$VERSION-eigen3-windows-msvc2022-x64-LLVM.zip"
        Write-Host "*** src $src"
        Write-Host "*** dst $dst"

        if (Test-Path $dst) {
            Remove-Item $dst
        }


        if (-not (Test-Path $src)) {
          throw "Source path does not exist: $src"
        }

        Compress-Archive -Path $src -DestinationPath $dst

        # zip fmt

        $src = "$env:GITHUB_WORKSPACE\install\msvc2022-x64-LLVM\fmt"
        $dst = "$env:GITHUB_WORKSPACE\bundle-3rdPartyBaseLibs-$VERSION-fmt-windows-msvc2022-x64-LLVM.zip"

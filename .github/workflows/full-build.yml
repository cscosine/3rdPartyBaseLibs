        Compress-Archive -Path $src -DestinationPath $dst

        # zip magic_enum

        $src = "$env:GITHUB_WORKSPACE\install\msvc2022-x64-LLVM\magic_enum"
        $dst = "$env:GITHUB_WORKSPACE\bundle-3rdPartyBaseLibs-$VERSION-magic_enum-windows-msvc2022-x64-LLVM.zip"

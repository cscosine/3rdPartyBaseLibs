        }

        Compress-Archive -Path $src -DestinationPath $dst

        # zip tl-optional

        $src = "$env:GITHUB_WORKSPACE\install\msvc2022-x64-LLVM\tl-optional"
        $dst = "$env:GITHUB_WORKSPACE\bundle-3rdPartyBaseLibs-$VERSION-tl-optional-windows-msvc2022-x64-LLVM.zip"

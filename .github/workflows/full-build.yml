        # zip pipes

        $src = "$env:GITHUB_WORKSPACE\install\msvc2022-x64-LLVM\pipes"
        $dst = "$env:GITHUB_WORKSPACE\bundle-3rdPartyBaseLibs-$VERSION-pipes-windows-msvc2022-x64-LLVM.zip"

name: Full Build

on:
  # 1️⃣ Run on push / PR to main branch or tag v*.*.*, the latter will trigger release
  push:
    branches: [ "cs-main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "cs-main" ]

  # 2️⃣ Manual trigger
  workflow_dispatch:   # manual trigger

  # 3️⃣ Scheduled (weekly)
  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC

  # 4️⃣ Triggered by other repositories
  repository_dispatch:
    types: [ dependent-repo-change ]

permissions:
  contents: write

# 🔒 Prevent duplicate / overlapping runs
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  general-build-info:
    name: Check Clang and System Info and Detect Trigger
    runs-on: ubuntu-latest

    steps:
      - name: Show OS and compiler info
        run: |
          echo "=== OS Information ==="
          cat /etc/os-release || true
          echo ""
          echo "=== Clang Version ==="
          clang++ --version || echo "clang++ not found"
          echo ""
          echo "=== GCC Version (if installed) ==="
          gcc --version || echo "gcc not found"
          echo ""
          echo "=== CMake Version (if installed) ==="
          cmake --version || echo "cmake not found"
          echo ""
          echo "=== Ninja Version (if installed) ==="
          ninja --version || echo "ninja not found"

      - name: Detect trigger
        id: trigger
        run: |
          echo "event_name=${{ github.event_name }}" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "trigger=dependent-repo" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "trigger=scheduled" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "trigger=manual" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "trigger=pull-request" >> $GITHUB_OUTPUT
          else
            echo "trigger=push" >> $GITHUB_OUTPUT
          fi

      - name: Print trigger info
        run: |
          echo "Event name : ${{ github.event_name }}"
          echo "Trigger    : ${{ steps.trigger.outputs.trigger }}"
          echo "Ref        : ${{ github.ref }}"
          echo "SHA        : ${{ github.sha }}"

      # 🔍 Optional: inspect repository_dispatch payload
      - name: Print repository dispatch payload
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Source repo : ${{ github.event.client_payload.source_repo }}"
          echo "Commit      : ${{ github.event.client_payload.commit }}"


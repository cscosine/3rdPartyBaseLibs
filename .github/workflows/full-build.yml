      uses: lukka/get-cmake@latest

    # ---------------------------------------------------

    # ---------------------------------------------------
    # build section
    - name: Build windows-msvc2022-x64-LLVM-eigen3 (1 / 1)
      run: cmake --workflow msvc2022-x64-LLVM

            architecture: x64
            architecture_variant: generic
            compiler: msvcclang
            toolset: ClangCL
            compiler_version: default
            generator: msvc2022
            generator_type: multiconfig
            generator_cmake: Visual Studio 17 2022
            runner: windows-2022
          - execution_id: 11

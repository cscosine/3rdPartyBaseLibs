name: 3rdPartyBaseLibs

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  csOrchestratorJob:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            runner: ubuntu-24.04
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvc
            compiler_version: default
            generator: msvc2022
            generator_type: multiconfig
            runner: windows-2022
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvc
            compiler_version: default
            generator: msvc2026
            generator_type: multiconfig
            runner: windows-2025-vs2026
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvcclang
            compiler_version: default
            generator: msvc2022
            generator_type: multiconfig
            runner: windows-2022
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvcclang
            compiler_version: default
            generator: msvc2026
            generator_type: multiconfig
            runner: windows-2025-vs2026

    steps:
      - name: csCMake
        uses: actions/checkout@v6
        with:
          repository: cscosine/csCMake.git
          path: workspace/csCMake
          ref: dev
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: eigen3
        uses: actions/checkout@v6
        with:
          repository: cscosine/eigen3.git
          path: workspace/eigen3
          ref: dev
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: cmake workflow on eigen3 CMake Workflow - (singleconfig)
        if: matrix.generator_type == 'singleconfig'
        shell: bash
        run: |
          set -e
          cmake --workflow workflow-csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}-release
        working-directory: workspace/eigen3

      - name: cmake workflow on eigen3 CMake Workflow - (multiconfig)
        if: matrix.generator_type == 'multiconfig'
        shell: bash
        run: |
          set -e
          cmake --workflow workflow-csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}-release
        working-directory: workspace/eigen3

      - name: Get Versions
        id: versions
        shell: python
        run: |
          from pathlib import Path
          import re
          import json
          import sys
          import os
          
          def grep_package_version(filename: Path) -> tuple[str | None,str | None]:
              path = Path(filename)
          
              if not path.is_file():
                  return (None, f"ERROR: file not found: {path}")
          
              content = path.read_text(encoding="utf-8")
          
              matches = []
          
              for m in re.finditer(
                  r'set\s*\(\s*PACKAGE_VERSION\s+("([^"]*)"|([^\s\)]+))\s*\)',
                  content,
              ):
                  value = m.group(2) or m.group(3)
          
                  # Ignore computed values like "${PACKAGE_VERSION} (...)"
                  if "${" in value:
                      continue
          
                  matches.append(value)
          
              if len(matches) != 1:
                  return (None, 
                      f"ERROR: {path}: expected exactly one PACKAGE_VERSION definition, found {len(matches)}"
                  )
          
              version = matches[0]
              return (version, None)
          
          files = {
              "eigen3": "workspace/install/csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}/eigen3/share/eigen3/cmake/Eigen3ConfigVersion.cmake",
          }
          
          result = []
          for name, filename in files.items():
            version_or_err = grep_package_version(filename)
            v_or_err = grep_package_version(filename=filename)
            if v_or_err[0] is not None:
                version = v_or_err[0]
                result.append({'name': name,'version': version})
            elif v_or_err[1] is not None:
                sys.exit(f'ERROR: processing {name} at {filename}: {v_or_err[1]}')
            else:
                sys.exit('ERROR: unexpected behavior of grep_package_version processing {name} at {filename}')
          output_file = os.environ["GITHUB_OUTPUT"]
          with open(output_file, "a", encoding="utf-8") as f:
              f.write(f"packages={json.dumps(result)}")
          

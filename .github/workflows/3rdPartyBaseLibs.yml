name: 3rdPartyBaseLibs

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  release-from-artifacts:
    needs: orchestrator-matrix
    runs-on: ubuntu-latest

    if: ${{ github.ref_type == 'tag' }}

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show downloaded files
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*    

  orchestrator-matrix:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            runner: ubuntu-24.04
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvc
            compiler_version: default
            generator: msvc2022
            generator_type: multiconfig
            runner: windows-2022
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvc
            compiler_version: default
            generator: msvc2026
            generator_type: multiconfig
            runner: windows-2025-vs2026
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvcclang
            compiler_version: default
            generator: msvc2022
            generator_type: multiconfig
            runner: windows-2022
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvcclang
            compiler_version: default
            generator: msvc2026
            generator_type: multiconfig
            runner: windows-2025-vs2026

    steps:
      - name: csCMake
        uses: actions/checkout@v6
        with:
          repository: cscosine/csCMake.git
          path: workspace/csCMake
          ref: dev
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: eigen3
        uses: actions/checkout@v6
        with:
          repository: cscosine/eigen3.git
          path: workspace/eigen3
          ref: dev
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: cmake workflow on eigen3 CMake Workflow - (singleconfig)
        if: matrix.generator_type == 'singleconfig'
        shell: bash
        run: |
          set -e
          cmake --workflow workflow-csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}-release
        working-directory: workspace/eigen3

      - name: cmake workflow on eigen3 CMake Workflow - (multiconfig)
        if: matrix.generator_type == 'multiconfig'
        shell: bash
        run: |
          set -e
          cmake --workflow workflow-csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}-release
        working-directory: workspace/eigen3

      - name: Get Versions
        id: versions
        shell: python
        run: |
          from pathlib import Path
          import re
          import json
          import sys
          import os
          
          def grep_package_version(filename: Path) -> tuple[str | None, str | None]:
              path = Path(filename)
          
              if not path.is_file():
                  return (None, f"ERROR: file not found: {path}")
          
              content = path.read_text(encoding="utf-8")
          
              matches = []
          
              for m in re.finditer(
                  r'set\s*\(\s*PACKAGE_VERSION\s+("([^"]*)"|([^\s\)]+))\s*\)',
                  content,
              ):
                  value = m.group(2) or m.group(3)
          
                  # Ignore computed values like "${PACKAGE_VERSION} (...)"
                  if "${" in value:
                      continue
          
                  matches.append(value)
          
              if len(matches) != 1:
                  return (None, f"ERROR: {path}: expected exactly one PACKAGE_VERSION definition, found {len(matches)}")
          
              version = matches[0]
              return (version, None)
          
          def find_cmake_config_version(search_path: Path, name: str) -> tuple[Path | None, str | None]:
              candidates = {
                  f"{name}-config-version.cmake".lower(),
                  f"{name}ConfigVersion.cmake".lower(),
              }
          
              matches = [p for p in search_path.rglob("*") if p.is_file() and p.name.lower() in candidates]
          
              if not matches:
                  return (None, f"No config version file found for '{name}' under '{search_path}'")
          
              if len(matches) > 1:
                  return (None, "Multiple config version files found:" + ", ".join(str(p) for p in matches))
          
              return (matches[0], None)
          
          files = {
          }
          
          result = []
          for name, filename in files.items():
            v_or_err = grep_package_version(filename=filename)
            if v_or_err[0] is not None:
                version = v_or_err[0]
                result.append({'name': name,'version': version})
            elif v_or_err[1] is not None:
                sys.exit(f'ERROR: processing {name} at {filename}: {v_or_err[1]}')
            else:
                sys.exit('ERROR: unexpected behavior of grep_package_version processing {name} at {filename}')
          
          repos_auto_search_list = [
              "eigen3",
          ]
          
          for name in repos_auto_search_list:
            search_path: Path = Path('workspace/install/csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}') / name
            path_or_err = find_cmake_config_version(search_path=search_path, name=name)
            if path_or_err[0] is not None:
              path = path_or_err[0]
              v_or_err = grep_package_version(filename=path)
              if v_or_err[0] is not None:
                version = v_or_err[0]
                result.append({'name': name,'version': version})
              elif v_or_err[1] is not None:
                sys.exit(f'ERROR: processing {name} at {filename}: {v_or_err[1]}')
              else:
                sys.exit('ERROR: unexpected behavior of grep_package_version processing {name} at {filename}')
            elif path_or_err[1] is not None:
                sys.exit(f'ERROR: processing {name} : {path_or_err[1]}')
            else:
                sys.exit('ERROR: unexpected behavior of find_cmake_config_version processing {name}')
          
          
          output_file = os.environ["GITHUB_OUTPUT"]
          with open(output_file, "w", encoding="utf-8") as f:
              f.write(f"packages={json.dumps(result)}")
          

      - name: Create Archives
        env:
          VERSIONS: ${{ steps.versions.outputs.packages }}
        shell: python
        run: |
          import json
          import os
          import tarfile
          from pathlib import Path
          
          versions = json.loads(os.environ['VERSIONS'])
          
          for entry in versions:
              name = entry['name']
              version = entry['version']
              install_subdir = Path('workspace/install/csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}').resolve()
              input_path = Path(install_subdir / Path(name)).resolve()
              output_path = Path(install_subdir / Path(name + '-' + version + '.tar.gz')).resolve()
              
              with tarfile.open(output_path, 'w:gz') as tar:
                  for path in input_path.rglob('*'):
                      resolved_path = path.resolve()
                      arcname = path.resolve().relative_to(install_subdir)
                      tar.add(resolved_path, arcname=arcname)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: 3rdPartyBaseLibs-0.1.0-csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}
          path: workspace/install/csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}/*.tar.gz

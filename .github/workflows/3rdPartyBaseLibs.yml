name: 3rdPartyBaseLibs

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  release-from-artifacts:
    needs: orchestrator-matrix
    runs-on: ubuntu-latest

    if: ${{ github.ref_type == 'tag' }}

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show downloaded files
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*    

  orchestrator-matrix:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - execution_id: 0
            os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            generator_cmake: Ninja
            runner: ubuntu-22.04
          - execution_id: 1
            os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            generator_cmake: Ninja Multi-Config
            runner: ubuntu-22.04
          - execution_id: 2
            os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            generator_cmake: Ninja
            runner: ubuntu-22.04
          - execution_id: 3
            os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            generator_cmake: Ninja Multi-Config
            runner: ubuntu-22.04
          - execution_id: 4
            os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            generator_cmake: Ninja
            runner: ubuntu-24.04
          - execution_id: 5
            os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            generator_cmake: Ninja Multi-Config
            runner: ubuntu-24.04
          - execution_id: 6
            os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            generator_cmake: Ninja
            runner: ubuntu-24.04
          - execution_id: 7
            os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            generator_cmake: Ninja Multi-Config
            runner: ubuntu-24.04
          - execution_id: 8
            os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvc
            compiler_version: default
            generator: msvc2022
            generator_type: multiconfig
            generator_cmake: Visual Studio 17 2022
            runner: windows-2022
          - execution_id: 9
            os: windows
            os_version: v10
